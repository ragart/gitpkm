name: Add Relationship
description: Request a new relationship row using a guided form.
title: "Add relationship: "
labels:
  - pkm:add-link
body:
  - type: markdown
    attributes:
      value: |
        Submit this form to create a relationship row through automation.

        Notes:
        - Source and target IDs must already exist.
        - Additional fields must use one key=value pair per line.
  - type: input
    id: source_id
    attributes:
      label: Source ID
      description: Existing source entity ID.
      placeholder: people_alex_doe
    validations:
      required: true
  - type: input
    id: target_id
    attributes:
      label: Target ID
      description: Existing target entity ID.
      placeholder: programs_career_mentorship
    validations:
      required: true
  - type: input
    id: relation_table
    attributes:
      label: Relationship Table (Optional)
      description: Leave empty to infer a unique table from schema.
      placeholder: participations
  - type: input
    id: relation_id
    attributes:
      label: Relationship ID (Optional)
      description: Leave empty to auto-generate.
      placeholder: participations_people_alex_doe_programs_career_mentorship
  - type: input
    id: role
    attributes:
      label: Role (Optional)
      description: Shortcut for the role column when applicable.
      placeholder: mentor
  - type: textarea
    id: additional_fields
    attributes:
      label: Additional Fields (Optional)
      description: One key=value pair per line.
      placeholder: |
        status=active
        confidence=high