name: Add Entity
description: Request a new entity row using a guided form.
title: "Add entity: "
labels:
  - pkm:add-entity
body:
  - type: markdown
    attributes:
      value: |
        Submit this form to create a new entity row through automation.

        Notes:
        - Dataset names are exact and map to data/<dataset>.csv.
        - If the dataset is new, you can define initial columns.
        - Additional fields must use one key=value pair per line.
  - type: input
    id: dataset
    attributes:
      label: Dataset
      description: Exact dataset/table name, for example people or programs.
      placeholder: people
    validations:
      required: true
  - type: input
    id: entity_name
    attributes:
      label: Entity Name
      description: Display name for the new entity.
      placeholder: Alex Doe
    validations:
      required: true
  - type: input
    id: entity_id
    attributes:
      label: Entity ID (Optional)
      description: Leave empty to auto-generate a stable ID.
      placeholder: people_alex_doe
  - type: input
    id: dataset_columns
    attributes:
      label: Dataset Columns (Optional)
      description: Comma-separated columns used if the dataset does not exist yet.
      placeholder: status,rarity,source
  - type: textarea
    id: additional_fields
    attributes:
      label: Additional Fields (Optional)
      description: One key=value pair per line. For new datasets, field keys become columns automatically.
      placeholder: |
        email=alex@example.com
        status=active