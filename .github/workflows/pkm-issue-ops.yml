---
name: PKM Issue Operations

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

jobs:
  route-issue:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.gate.outputs.enabled }}
      requested_mode: ${{ steps.detect.outputs.requested_mode }}
      mode: ${{ steps.detect.outputs.mode }}
      authorized: ${{ steps.detect.outputs.authorized }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check repository gate
        id: gate
        run: |
          if [ -f .github/pkm-issue-ops.enabled ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure PKM labels exist
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const desired = [
              { name: 'pkm:add-entity', color: '0e8a16', description: 'Process issue as PKM entity request' },
              { name: 'pkm:add-link', color: '1d76db', description: 'Process issue as PKM relationship request' }
            ];

            for (const label of desired) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  throw error;
                }
              }
            }

      - name: Detect request type
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const authorAssociation = (issue.author_association || '').toUpperCase();
            const authorized = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(authorAssociation);
            const labels = (issue.labels || []).map(l => (l.name || '').toLowerCase());
            const body = (issue.body || '').toLowerCase();
            const title = (issue.title || '').toLowerCase();
            let requestedMode = '';

            const looksLikeEntity = labels.includes('pkm:add-entity')
              || title.startsWith('add entity:')
              || (body.includes('### dataset') && body.includes('### entity name'));
            const looksLikeLink = labels.includes('pkm:add-link')
              || title.startsWith('add relationship:')
              || (body.includes('### source id') && body.includes('### target id'));

            if (looksLikeEntity) {
              requestedMode = 'entity';
            } else if (looksLikeLink) {
              requestedMode = 'link';
            }

            const enabled = '${{ steps.gate.outputs.enabled }}' === 'true';
            const mode = enabled && authorized ? requestedMode : '';

            core.setOutput('authorized', authorized ? 'true' : 'false');
            core.setOutput('requested_mode', requestedMode);
            core.setOutput('mode', mode);

            if (enabled && mode === 'entity' && !labels.includes('pkm:add-entity')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['pkm:add-entity']
              });
            }

            if (enabled && mode === 'link' && !labels.includes('pkm:add-link')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['pkm:add-link']
              });
            }

  add-entity:
    if: ${{ needs.route-issue.outputs.mode == 'entity' }}
    needs: route-issue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Save issue body
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs');
            fs.writeFileSync('issue_body.md', context.payload.issue.body || '', 'utf8');

      - name: Apply entity request
        run: |
          python scripts/automation/process_issue_form.py --mode entity --body-file issue_body.md

      - name: Run full automation pipeline
        run: |
          python scripts/automation/run_all.py

      - name: Commit and push to default branch
        id: push
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat: apply entity request from issue #${{ github.event.issue.number }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment with PR result
        uses: actions/github-script@v8
        with:
          script: |
            const outcome = '${{ steps.push.outcome }}';
            const changed = '${{ steps.push.outputs.changed }}';
            const issueNumber = context.issue.number;
            if (outcome === 'failure') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: 'Entity request was processed but push to default branch failed. Check branch protection and workflow write permissions.'
              });
            } else if (changed === 'true') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Applied entity request directly to \`${context.payload.repository.default_branch}\`.`
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: 'No changes were generated (for example, entity already exists).'
              });
            }

      - name: Close issue
        if: ${{ steps.push.outcome == 'success' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

  add-link:
    if: ${{ needs.route-issue.outputs.mode == 'link' }}
    needs: route-issue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Save issue body
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs');
            fs.writeFileSync('issue_body.md', context.payload.issue.body || '', 'utf8');

      - name: Apply relationship request
        run: |
          python scripts/automation/process_issue_form.py --mode link --body-file issue_body.md

      - name: Run full automation pipeline
        run: |
          python scripts/automation/run_all.py

      - name: Commit and push to default branch
        id: push
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat: apply relationship request from issue #${{ github.event.issue.number }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment with PR result
        uses: actions/github-script@v8
        with:
          script: |
            const outcome = '${{ steps.push.outcome }}';
            const changed = '${{ steps.push.outputs.changed }}';
            const issueNumber = context.issue.number;
            if (outcome === 'failure') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: 'Relationship request was processed but push to default branch failed. Check branch protection and workflow write permissions.'
              });
            } else if (changed === 'true') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Applied relationship request directly to \`${context.payload.repository.default_branch}\`.`
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: 'No changes were generated (for example, link already exists).'
              });
            }

      - name: Close issue
        if: ${{ steps.push.outcome == 'success' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

  issue-ops-disabled:
    if: ${{ needs.route-issue.outputs.enabled != 'true' && needs.route-issue.outputs.requested_mode != '' }}
    needs: route-issue
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled automation
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'PKM issue automation is disabled in this repository. To enable it here, add file `.github/pkm-issue-ops.enabled` and commit it.'
            });

  issue-ops-unrecognized:
    if: ${{ needs.route-issue.outputs.enabled == 'true' && needs.route-issue.outputs.requested_mode == '' }}
    needs: route-issue
    runs-on: ubuntu-latest
    steps:
      - name: Explain unrecognized request
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Issue automation is enabled, but this issue was not recognized as an Add Entity/Add Relationship request. Use the issue forms or include the expected sections in the issue body.'
            });

  issue-ops-forbidden:
    if: ${{ needs.route-issue.outputs.enabled == 'true' && needs.route-issue.outputs.requested_mode != '' && needs.route-issue.outputs.authorized != 'true' }}
    needs: route-issue
    runs-on: ubuntu-latest
    steps:
      - name: Explain maintainer restriction
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'This repository only accepts issue-form automation from maintainers (`OWNER`, `MEMBER`, or `COLLABORATOR`).'
            });

      - name: Close forbidden issue
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });